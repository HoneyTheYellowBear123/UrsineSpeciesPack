 ##############################################
 ############ CIVICS #########################
 #############################################
 civic_honeybear_ursinespeciespack_apiarists: "Apiarists"
 civic_honeybear_ursinespeciespack_apiarists_desc: "An appreciation for the sweeter things in life has led to advanced farming methods and a profound respect for the creatures that make this civilization's foodstuffs. Sharing of techniques has united all members of this civilization, and the careful watch over their honey producing colonies has been essential to their understanding of functional societies."
 civic_tooltip_honeybear_ursinespeciespack_apiarists_effects: "Increased opinion with Hive Mind and Arthropoid empires."
 councilor_honeybear_ursinespeciespack_apiarists: "Supersedurian"
 councilor_honeybear_ursinespeciespack_apiarists_female: "$councilor_honeybear_ursinespeciespack_apiaristsl$"
 councilor_honeybear_ursinespeciespack_apiarists_desc: "The $TITLE$ coordinates education and production to ensure hives are harvested sustainably."
 triggered_honeybear_ursinespeciespack_apiarists: "Apiarists"


 civic_honeybear_ursinespeciespack_territorial: "Territorial"
 civic_honeybear_ursinespeciespack_territorial_desc: "Property and borders are deeply entrenched in this society's concept of civilization, with extensive detailed records establishing who occupies where, and passionate defense of their homeland."
 civic_tooltip_honeybear_ursinespeciespack_territorial_effects: "Opening borders to any empire costs 0.25 £influence£ §Y$influence$§! per month. Overlord/Subject/Federated relations are exempt."
 councilor_honeybear_ursinespeciespack_territorial: "Chief Cartographer"
 councilor_honeybear_ursinespeciespack_territorial_female: "$councilor_honeybear_ursinespeciespack_territoriall$"
 councilor_honeybear_ursinespeciespack_territorial_desc: "The $TITLE$ coordinates education and production to ensure hives are harvested sustainably."



 civic_honeybear_ursinespeciespack_cub_scouts: "Cub Scouts"
 civic_honeybear_ursinespeciespack_cub_scouts_desc: "This society operates youth organizations built around outdoorsmanship and meritable skills. This leads to an enthusiasm for learning new skills, and an eagerness to explore the unknown... and also smoothly prepares citizens to follow orders when they are older."
 civic_honeybear_ursinespeciespack_cub_scouts_effects: "§Y$commander_plural_with_icon$§! and §Y$scientist_plural_with_icon$§! start with the §Y$leader_trait_scout$§! trait."
 councilor_honeybear_ursinespeciespack_cub_scouts: "Scoutmaster"
 councilor_honeybear_ursinespeciespack_cub_scouts_female: "$councilor_honeybear_ursinespeciespack_cub_scouts$"
 councilor_honeybear_ursinespeciespack_cub_scouts_desc: "The $TITLE$ organizes camping trips and ensures youths are well versed in all manner of knots."


 civic_honeybear_ursinespeciespack_berserkers: "Berserkers"
 civic_honeybear_ursinespeciespack_berserkers_desc: "This culture has developed a caste of warriors that utilize a spiritual battle trance, assisted by the ingestion of mysterious substances, to inflict terror and destruction upon their foes."
 civic_tooltip_honeybear_ursinespeciespack_berserkers_effects: "$t$- Access to ['concept_berserker_armies'] $TABBED_NEW_LINE$- Access to ['concept_berserker_edicts'] "
 councilor_honeybear_ursinespeciespack_berserkers: "Berserkhan"
 councilor_honeybear_ursinespeciespack_berserkers_female: "$councilor_honeybear_ursinespeciespack_berserkers$"
 councilor_honeybear_ursinespeciespack_berserkers_desc: "The $TITLE$ personally taste tests every batch of the secret recipe consumed to enter the berserker battle rage."
 concept_berserker_edicts: "Berserker Edicts"
 concept_berserker_edicts_desc: "- ['edict:berserker_rage', $edict_berserker_rage$]\n- ['edict:berserker_fever', $edict_berserker_fever$]\n- ['edict:berserker_trance', $edict_berserker_trance$]"
 edict_berserker_rage: "Berserker Rage"
 edict_berserker_rage_desc: "The mass production of the berserker battle rage concoction can be distributed to every soldier in our army for increased combat ferocity."
 edict_berserker_fever: "Berserker Fever"
 edict_berserker_fever_desc: "An alternative brew of the berserker battle rage recipe can be made with the pulpy byproduct of exotic gases, to bring out our soldier's destructive urges."
 edict_berserker_trance: "Berserker Trance"
 edict_berserker_trance_desc: "In an act that defies our established principles concerning zro, our berserkers have discovered a way to consume it that reduces battle fatigue by entering a state of elevated consciousness."
 concept_berserker_armies: "Berserker Armies"
 concept_berserker_armies_desc: "- ['army:berserker_army', $berserker_army$]\n- ['army:berserker_gas_army', $berserker_gas_army$]\n- ['army:berserker_zro_army', $berserker_zro_army$]"
 berserker_army: "Berserker Army"
 berserker_army_desc: "Violent, destructive warriors raised with brutality in mind and empowered by ingesting special concoctions."
 berserker_gas_army: "Bergazker Army"
 berserker_gas_army_desc: "Since the discovery of exotic gases, some berserker units have developed increased ferocity by ingesting the pulpy residue that accrues during its combustion."
 berserker_zro_army: "Berzroker Army"
 berserker_zro_army_desc: "berserker warriors that have chosen to ingest zro, claiming they feel the strength and destructive desire of something ravenous."
 civic_tooltip_honeybear_ursinespeciespack_militarist_or_spiritualist: "Is some degree of §YMilitarist§! or §YSpiritualist§!"


