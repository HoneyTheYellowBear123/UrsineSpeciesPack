 ################################
 ######### SPECIES TRAITS #######
 ################################
 trait_honeybear_ursinespeciespack_saBEAR_toothed: "Sabear Toothed"
 trait_honeybear_ursinespeciespack_saBEAR_toothed_desc: "An adaptation that made early hunters in this species more effective, large and cumbersome teeth now make eating a messy and inefficient activity in an era of intergalactic food production."
 trait_honeybear_ursinespeciespack_Bear_necessities: "Bear Necessities"
 trait_honeybear_ursinespeciespack_Bear_necessities_desc: "Trade was not prominent in the early history of this species, leading to a cultural uptick in resourcefulness and personal crafts that allows this species to get by with less waste."
 trait_honeybear_ursinespeciespack_simple_Bear_necessities: "Simple Bear Necessities"
 trait_honeybear_ursinespeciespack_simple_Bear_necessities_desc: "Trade was almost non-existent in the early history of this species, leading to a cultural necessitation of resourcefulness and personal crafts that allows this species to get by with much less waste."
 trait_honeybear_ursinespeciespack_limBear: "Limbear"
 trait_honeybear_ursinespeciespack_limBear_desc: "Despite their bulky appearance, this species is actually very flexible."
 trait_honeybear_ursinespeciespack_Bearfooted: "Bearfooted"
 trait_honeybear_ursinespeciespack_Bearfooted_desc: "A bundle of nerves in the feet of this species prevents standard footwear from being effective or inexpensive, and leads to increased sensitivity."
 trait_honeybear_ursinespeciespack_Bearfooted_effect: "Habitability on worlds with a different ['concept_climate_category'] from our Preference: §R-10%§!"
 trait_honeybear_ursinespeciespack_Majestic: "Majestic"
 trait_honeybear_ursinespeciespack_Majestic_desc: "Powerful, fearsome, beautiful, this species has it all, and even the most passionate xenophobes cannot deny it."
 trait_honeybear_ursinespeciespack_Majestic_effect: "Every $pop_group_unit$ £pop£ §HPops§! working as a slave or better produces 0.005 £influence£ §Y$influence$§! per month."


