 honeybear_ursinespeciespack_prescripted_country_name: "Zekr'ban Bearzerkhanate"
 honeybear_ursinespeciespack_prescripted_country_name_desc: "A species that was locked in almost constant combat for the entirety of their history, it was almost unfathonable when planetary unity was achieved and galactic development was actually possible. Now, we venture unto the stars to flex our dominance among the lesser beasts that think themselves our peers."
